# =====================================================================
# Commuters Route System - Backend Configuration
# =====================================================================

# Server
server.port=5050

# MySQL Datasource (matches commuters_route_system.sql)
# Update the port/username/password to match your MySQL Workbench setup
spring.datasource.url=jdbc:mysql://localhost:3307/commuters_route_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abcd1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# ddl-auto=update will create/update the "users" table based on the User entity.
# Set to "validate" once your schema is finalized via the SQL script instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
# Replace with your own long, random secret before deploying (256-bit minimum for HS256)
app.jwt.secret=X9vK2mQ7#Lp8Nz4!Rw5TgY1@Hd6CsJf3Ua0BeW$Mi9PxVr2Fn8QkLt7ZhEc5DyA
app.jwt.expiration-ms=86400000

# CORS - allowed origin for the React dev server (Vite default port)
# Updated to accept both 5173 and 5174 (in case port changes)
app.cors.allowed-origin=http://localhost:5174
